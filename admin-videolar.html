<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Paneli | Video Girişi</title>
  <style>
    :root {
      --bg: #0a1220;
      --text-main: #f4f7fb;
      --text-soft: #b8c4d6;
      --text-faint: #7f91aa;
      --primary: #f07a2b;
      --line: rgba(255,255,255,0.08);
      --card-bg: linear-gradient(180deg, rgba(60,82,118,.92), rgba(42,60,92,.92));
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, Arial, sans-serif;
      min-height: 100vh;
      color: var(--text-main);
      background:
        radial-gradient(circle at top left, rgba(240,122,43,.12), transparent 28%),
        radial-gradient(circle at top right, rgba(65,108,170,.10), transparent 26%),
        linear-gradient(180deg, #111c2f 0%, #0c1525 36%, #070f1b 100%);
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 28px 24px 40px; }
    .panel {
      padding: 24px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,.10);
      background: var(--card-bg);
      box-shadow: 0 18px 34px rgba(0,0,0,.22);
    }
    .panel + .panel { margin-top: 24px; }
    h1 { font-size: 32px; margin-bottom: 10px; }
    h2 { font-size: 24px; margin-bottom: 14px; }
    .sub { color: var(--text-soft); line-height: 1.7; margin-bottom: 22px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    .full { grid-column: 1 / -1; }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 700;
    }
    input, textarea, select {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(8,15,28,.42);
      color: var(--text-main);
      outline: none;
    }
    textarea { min-height: 120px; resize: vertical; }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    button {
      padding: 14px 18px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-weight: 800;
    }
    .primary {
      background: linear-gradient(90deg, var(--primary), #ff9650);
      color: #fff;
    }
    .secondary {
      background: rgba(255,255,255,.08);
      color: #fff;
      border: 1px solid rgba(255,255,255,.10);
    }
    .status {
      margin-top: 18px;
      min-height: 22px;
      font-weight: 700;
    }
    .ok { color: #9ef0b3; }
    .err { color: #ffb4b4; }
    .list { display: grid; gap: 14px; }
    .item {
      padding: 18px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.05);
    }
    .item h3 { margin-bottom: 8px; font-size: 20px; }
    .meta { color: var(--text-soft); font-size: 14px; line-height: 1.7; }
    @media (max-width: 800px) {
      .grid { grid-template-columns: 1fr; }
      .full { grid-column: auto; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="panel">
      <h1>Admin Video Girişi</h1>
      <div class="sub">Buradan eklediğin videolar herkes için ortak olarak yayınlanır.</div>

      <form id="videoForm">
        <div class="grid">
          <div class="full">
            <label for="title">Video başlığı</label>
            <input id="title" required />
          </div>

          <div class="full">
            <label for="description">Açıklama</label>
            <textarea id="description" required></textarea>
          </div>

          <div>
            <label for="category">Kategori</label>
            <select id="category" required>
              <option value="">Seçiniz</option>
              <option value="ielts">IELTS</option>
              <option value="toefl">TOEFL</option>
              <option value="yds">YDS</option>
              <option value="genel">Genel İngilizce</option>
            </select>
          </div>

          <div>
            <label for="duration">Süre</label>
            <input id="duration" placeholder="12 dk" required />
          </div>

          <div>
            <label for="level">Seviye</label>
            <input id="level" placeholder="A2 - B1" required />
          </div>

          <div>
            <label for="youtube">YouTube linki veya ID</label>
            <input id="youtube" required />
          </div>
        </div>

        <div class="actions">
          <button type="submit" class="primary">Videoyu Kaydet</button>
          <button type="button" class="secondary" id="clearBtn">Formu Temizle</button>
        </div>

        <div id="status" class="status"></div>
      </form>
    </div>

    <div class="panel">
      <h2>Yayınlanmış videolar</h2>
      <div id="videoList" class="list"></div>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxTz0AeA_8u--jrvFZp8JZRGTtdj3JPpY-uBLHHveGLCeVcGham182YgY8AQKelaXDRVQ/exec";

    const categoryLabels = {
      ielts: "IELTS",
      toefl: "TOEFL",
      yds: "YDS",
      genel: "Genel İngilizce"
    };

    const form = document.getElementById("videoForm");
    const statusEl = document.getElementById("status");
    const listEl = document.getElementById("videoList");

    function setStatus(message, type = "") {
      statusEl.textContent = message;
      statusEl.className = `status ${type}`;
    }

    function getYoutubeId(input) {
      const value = input.trim();
      if (/^[a-zA-Z0-9_-]{11}$/.test(value)) return value;

      try {
        const url = new URL(value);

        if (url.hostname.includes("youtu.be")) {
          return url.pathname.replace("/", "").trim();
        }

        if (url.hostname.includes("youtube.com")) {
          const watchId = url.searchParams.get("v");
          if (watchId) return watchId.trim();

          const parts = url.pathname.split("/").filter(Boolean);
          const embedIndex = parts.findIndex(p => p === "embed");
          if (embedIndex !== -1 && parts[embedIndex + 1]) {
            return parts[embedIndex + 1].trim();
          }
        }
      } catch (e) {}

      return "";
    }

    async function loadVideos() {
      try {
        const res = await fetch(API_URL);
        const videos = await res.json();

        if (!Array.isArray(videos) || videos.length === 0) {
          listEl.innerHTML = `<div class="item"><div class="meta">Henüz kayıtlı video yok.</div></div>`;
          return;
        }

        listEl.innerHTML = videos.slice().reverse().map(video => `
          <div class="item">
            <h3>${video.title || ""}</h3>
            <div class="meta">
              ${video.categoryLabel || ""} · ${video.duration || ""} · ${video.level || ""}
            </div>
            <div class="meta" style="margin-top:8px;">${video.description || ""}</div>
            <div class="meta" style="margin-top:8px;">YouTube ID: ${video.youtubeId || ""}</div>
          </div>
        `).join("");
      } catch (error) {
        listEl.innerHTML = `<div class="item"><div class="meta">Videolar yüklenemedi.</div></div>`;
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      setStatus("");

      const title = document.getElementById("title").value.trim();
      const description = document.getElementById("description").value.trim();
      const category = document.getElementById("category").value;
      const duration = document.getElementById("duration").value.trim();
      const level = document.getElementById("level").value.trim();
      const youtubeRaw = document.getElementById("youtube").value.trim();
      const youtubeId = getYoutubeId(youtubeRaw);

      if (!youtubeId) {
        setStatus("Geçerli bir YouTube linki veya ID gir.", "err");
        return;
      }

      const payload = {
        title,
        description,
        category,
        categoryLabel: categoryLabels[category] || category,
        duration,
        level,
        youtubeId,
        createdAt: new Date().toISOString()
      };

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload)
        });

        const result = await res.json();

        if (result.success) {
          setStatus("Video başarıyla kaydedildi.", "ok");
          form.reset();
          loadVideos();
        } else {
          setStatus("Kayıt sırasında hata oluştu.", "err");
        }
      } catch (error) {
        setStatus("Bağlantı hatası oluştu.", "err");
      }
    });

    document.getElementById("clearBtn").addEventListener("click", () => {
      form.reset();
      setStatus("");
    });

    loadVideos();
  </script>
</body>
</html>
