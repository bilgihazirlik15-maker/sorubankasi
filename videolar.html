<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Videolar | Soru Bankası</title>
  <style>
    :root {
      --bg: #0a1220;
      --text-main: #f4f7fb;
      --text-soft: #b8c4d6;
      --text-faint: #7f91aa;
      --primary: #f07a2b;
      --line: rgba(255,255,255,0.08);
      --shadow: 0 22px 48px rgba(0,0,0,0.34);
      --card-bg: linear-gradient(180deg, rgba(60,82,118,.92), rgba(42,60,92,.92));
      --card-bg-hover: linear-gradient(180deg, rgba(72,98,138,.96), rgba(48,70,106,.96));
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Inter, Arial, sans-serif;
      min-height: 100vh;
      color: var(--text-main);
      background:
        radial-gradient(circle at top left, rgba(240,122,43,.12), transparent 28%),
        radial-gradient(circle at top right, rgba(65,108,170,.10), transparent 26%),
        linear-gradient(180deg, #111c2f 0%, #0c1525 36%, #070f1b 100%);
    }

    a { text-decoration: none; color: inherit; }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 26px 24px 42px;
    }

    .hero {
      padding: 28px;
      border-radius: 28px;
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,.10);
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }

    .hero h1 {
      font-size: 34px;
      margin-bottom: 12px;
    }

    .hero p {
      color: #d7e2f0;
      line-height: 1.75;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding: 20px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,.10);
      background: var(--card-bg);
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .filter-btn {
      padding: 11px 16px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
      color: var(--text-soft);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all .25s ease;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: var(--primary);
      color: #fff;
      border-color: rgba(240,122,43,.35);
      transform: translateY(-1px);
    }

    .search-box {
      min-width: 260px;
      flex: 1;
      max-width: 360px;
    }

    .search-box input {
      width: 100%;
      padding: 13px 16px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(8,15,28,.42);
      color: var(--text-main);
      outline: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 22px;
    }

    .video-card {
      overflow: hidden;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,.10);
      background: var(--card-bg);
      box-shadow: 0 18px 34px rgba(0,0,0,.18);
      transition: all .25s ease;
    }

    .video-card:hover {
      transform: translateY(-6px);
      border-color: rgba(240,122,43,.35);
      background: var(--card-bg-hover);
      box-shadow: 0 25px 45px rgba(0,0,0,.35);
    }

    .video-frame {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background: #0b1422;
    }

    .video-frame iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .video-info {
      padding: 20px;
    }

    .video-topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .video-category {
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.06);
      font-size: 11px;
      color: #dbe7f6;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .video-duration {
      color: #ffb37d;
      font-size: 13px;
      font-weight: 700;
    }

    .video-title {
      font-size: 22px;
      color: #fff;
      margin-bottom: 10px;
      line-height: 1.35;
    }

    .video-desc {
      color: #d7e2f0;
      font-size: 15px;
      line-height: 1.75;
      margin-bottom: 16px;
    }

    .video-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .video-level {
      color: #c7d4e6;
      font-size: 13px;
      font-weight: 700;
    }

    .watch-link {
      color: #ffab72;
      font-weight: 800;
      font-size: 14px;
    }

    .empty-state {
      display: none;
      padding: 28px;
      border-radius: 24px;
      border: 1px dashed rgba(255,255,255,.14);
      background: rgba(255,255,255,.03);
      color: #d7e2f0;
      text-align: center;
      font-size: 15px;
      line-height: 1.7;
    }

    @media (max-width: 860px) {
      .toolbar {
        flex-direction: column;
        align-items: stretch;
      }
      .search-box {
        max-width: none;
      }
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <h1>Video içerikleri</h1>
      <p>Admin panelinden eklenen videolar burada otomatik yayınlanır.</p>
    </section>

    <section class="toolbar">
      <div class="filters">
        <button class="filter-btn active" data-category="all">Tümü</button>
        <button class="filter-btn" data-category="ielts">IELTS</button>
        <button class="filter-btn" data-category="toefl">TOEFL</button>
        <button class="filter-btn" data-category="yds">YDS</button>
        <button class="filter-btn" data-category="genel">Genel İngilizce</button>
      </div>

      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Video başlığında ara..." />
      </div>
    </section>

    <div class="grid" id="videoGrid"></div>
    <div class="empty-state" id="emptyState">
      Aradığınız kritere uygun video bulunamadı.
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxTz0AeA_8u--jrvFZp8JZRGTtdj3JPpY-uBLHHveGLCeVcGham182YgY8AQKelaXDRVQ/exec";

    const fallbackVideos = [
      {
        title: "IELTS Writing Task 2 Giriş Teknikleri",
        description: "IELTS Writing Task 2 için etkili giriş paragrafı kurma yöntemleri.",
        category: "ielts",
        categoryLabel: "IELTS",
        duration: "12 dk",
        level: "B1 - B2",
        youtubeId: "HAnw168huqA"
      }
    ];

    const videoGrid = document.getElementById("videoGrid");
    const emptyState = document.getElementById("emptyState");
    const filterButtons = document.querySelectorAll(".filter-btn");
    const searchInput = document.getElementById("searchInput");

    let activeCategory = "all";
    let allVideos = [];

    async function loadVideos() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();
        allVideos = Array.isArray(data) && data.length > 0 ? data.reverse() : fallbackVideos;
      } catch (error) {
        allVideos = fallbackVideos;
      }
      renderVideos();
    }

    function renderVideos() {
      const searchTerm = searchInput.value.trim().toLowerCase();

      const filteredVideos = allVideos.filter(video => {
        const matchesCategory = activeCategory === "all" || video.category === activeCategory;
        const matchesSearch = (video.title || "").toLowerCase().includes(searchTerm);
        return matchesCategory && matchesSearch;
      });

      videoGrid.innerHTML = "";

      if (filteredVideos.length === 0) {
        emptyState.style.display = "block";
        return;
      }

      emptyState.style.display = "none";

      filteredVideos.forEach(video => {
        const card = document.createElement("article");
        card.className = "video-card";

        card.innerHTML = `
          <div class="video-frame">
            <iframe
              src="https://www.youtube.com/embed/${video.youtubeId}"
              title="${video.title}"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowfullscreen>
            </iframe>
          </div>
          <div class="video-info">
            <div class="video-topline">
              <div class="video-category">${video.categoryLabel}</div>
              <div class="video-duration">${video.duration}</div>
            </div>
            <h2 class="video-title">${video.title}</h2>
            <p class="video-desc">${video.description}</p>
            <div class="video-footer">
              <div class="video-level">Seviye: ${video.level}</div>
              <a class="watch-link" href="https://www.youtube.com/watch?v=${video.youtubeId}" target="_blank" rel="noopener noreferrer">
                Youtube'da aç →
              </a>
            </div>
          </div>
        `;

        videoGrid.appendChild(card);
      });
    }

    filterButtons.forEach(button => {
      button.addEventListener("click", () => {
        filterButtons.forEach(btn => btn.classList.remove("active"));
        button.classList.add("active");
        activeCategory = button.dataset.category;
        renderVideos();
      });
    });

    searchInput.addEventListener("input", renderVideos);

    loadVideos();
  </script>
</body>
</html>
